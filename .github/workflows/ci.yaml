name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint & Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ansible ansible-lint yamllint

      - name: Run yamllint
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 160}}}" \
            install.yaml install-languages.yaml editors/

      - name: Run ansible-lint
        run: |
          ansible-lint install.yaml install-languages.yaml
        continue-on-error: true

      - name: Run ansible syntax check
        run: |
          ansible-playbook --syntax-check install.yaml \
            -e "user_role=developer dock_changes=n" \
            -i "localhost,"
